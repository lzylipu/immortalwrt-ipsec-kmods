name: Build ImmortalWrt 25.12 IPsec kmods

on:
  workflow_dispatch:
    inputs:
      immortalwrt_version:
        description: "ImmortalWrt 25.12 release；留空=自动取 downloads 最新 25.12.x"
        required: false
        default: ""
      target_path:
        description: "OpenWrt target/subtarget"
        required: false
        default: "x86/64"
      arch_packages:
        description: "Package arch"
        required: false
        default: "x86_64"
      release_tag:
        description: "Release tag；留空=按 version.buildinfo 自动生成"
        required: false
        default: ""
  schedule:
    # 每周二自动检查 ImmortalWrt downloads 是否出现新的 25.12.x release。
    - cron: "23 2 * * 2"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve ImmortalWrt release
        id: resolve
        env:
          INPUT_VERSION: ${{ inputs.immortalwrt_version || '' }}
          INPUT_TARGET: ${{ inputs.target_path || 'x86/64' }}
          INPUT_ARCH: ${{ inputs.arch_packages || 'x86_64' }}
          INPUT_TAG: ${{ inputs.release_tag || '' }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json, os, re, urllib.request, urllib.error
          from urllib.request import Request

          version = os.environ.get('INPUT_VERSION') or ''
          target = os.environ.get('INPUT_TARGET') or 'x86/64'
          arch = os.environ.get('INPUT_ARCH') or 'x86_64'
          input_tag = os.environ.get('INPUT_TAG') or ''
          base_releases = 'https://downloads.immortalwrt.org/releases/'

          def fetch_text(url):
              return urllib.request.urlopen(url, timeout=30).read().decode()

          def version_key(v):
              # Prefer stable 25.12.x over rc when both exist.
              m = re.match(r'^(\d+)\.(\d+)\.(\d+)(?:-rc(\d+))?$', v)
              if not m:
                  return (0, 0, 0, -99)
              major, minor, patch, rc = m.groups()
              rc_score = 100 if rc is None else int(rc)
              return (int(major), int(minor), int(patch), rc_score)

          if not version:
              html = fetch_text(base_releases)
              versions = sorted(set(re.findall(r'href="(25\.12\.[^/]+?)/"', html)), key=version_key)
              if not versions:
                  raise SystemExit('No 25.12.x release found at ' + base_releases)
              version = versions[-1]

          base = f'https://downloads.immortalwrt.org/releases/{version}/targets/{target}'
          revision = fetch_text(base + '/version.buildinfo').splitlines()[0].strip()
          revision_short = revision.split('-', 1)[0]
          target_tag = target.replace('/', '-')
          tag = input_tag or f'immortalwrt-{version}-{target_tag}-{revision_short}'

          token = os.environ.get('GH_TOKEN') or ''
          req = Request(f'https://api.github.com/repos/{os.environ["GITHUB_REPOSITORY"]}/releases/tags/{tag}', headers={
              'Accept': 'application/vnd.github+json',
              'User-Agent': 'immortalwrt-ipsec-kmods',
              **({'Authorization': 'Bearer ' + token} if token else {}),
          })
          skip = 'false'
          try:
              urllib.request.urlopen(req, timeout=30).read()
              skip = 'true'
          except urllib.error.HTTPError as e:
              if e.code != 404:
                  raise

          print(f'version={version}')
          print(f'target={target}')
          print(f'arch={arch}')
          print(f'tag={tag}')
          print(f'revision={revision}')
          print(f'skip={skip}')
          PY
          echo "Resolved version=${{ steps.resolve.outputs.version }} tag=${{ steps.resolve.outputs.tag }} skip=${{ steps.resolve.outputs.skip }}"

      - name: Install host tools
        if: steps.resolve.outputs.skip != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib gettext git libncurses-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget curl zstd

      - name: Build kmod APKs
        if: steps.resolve.outputs.skip != 'true'
        run: |
          chmod +x scripts/build-ipsec-kmods.sh
          scripts/build-ipsec-kmods.sh "${{ steps.resolve.outputs.version }}" "${{ steps.resolve.outputs.target }}" "${{ steps.resolve.outputs.arch }}"

      - name: Publish release
        if: steps.resolve.outputs.skip != 'true'
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.resolve.outputs.tag }}
          name: ${{ steps.resolve.outputs.tag }}
          body_path: out/buildinfo.txt
          files: |
            out/*.apk
            out/buildinfo.txt
            out/assets.txt
            out/SHA256SUMS
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Already published
        if: steps.resolve.outputs.skip == 'true'
        run: echo "${{ steps.resolve.outputs.tag }} already exists; nothing to build."

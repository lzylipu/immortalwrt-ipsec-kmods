name: Build ImmortalWrt 25.12 IPsec kmods

on:
  workflow_dispatch:
    inputs:
      immortalwrt_version:
        description: "ImmortalWrt 25.12 release"
        required: true
        default: "25.12.0"
        type: choice
        options:
          - 25.12.0
          - 25.12.0-rc2
          - 25.12.0-rc1
      target_path:
        description: "OpenWrt target/subtarget"
        required: true
        default: "x86/64"
      arch_packages:
        description: "Package arch"
        required: true
        default: "x86_64"
      release_tag:
        description: "Release tag consumed by ImageBuilder"
        required: true
        default: "immortalwrt-25.12.0-x86-64-r37854"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Install host tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib gettext git libncurses-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget curl zstd
      - name: Build kmod APKs
        run: |
          chmod +x scripts/build-ipsec-kmods.sh
          scripts/build-ipsec-kmods.sh "${{ inputs.immortalwrt_version }}" "${{ inputs.target_path }}" "${{ inputs.arch_packages }}"
      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.release_tag }}
          name: ${{ inputs.release_tag }}
          body_path: out/buildinfo.txt
          files: |
            out/*.apk
            out/buildinfo.txt
            out/assets.txt
            out/SHA256SUMS
          token: ${{ secrets.GITHUB_TOKEN }}
